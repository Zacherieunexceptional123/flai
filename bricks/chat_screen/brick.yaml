name: chat_screen
description: Full-page AI chat screen composing message bubbles, input bar, streaming text, and typing indicator
version: 0.1.0
environment:
  mason: ">=0.1.0 <1.0.0"
vars:
  output_dir:
    type: string
    description: Output directory for generated files
    default: flai
    prompt: "Where are your FlAI files?"
