<svg viewBox="0 0 1500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="flai-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0F23" />
      <stop offset="100%" stop-color="#1A1A3E" />
    </linearGradient>
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#6366F1" opacity="0.2" />
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bg-grad)" />
  <rect width="1500" height="500" fill="url(#dots)" />
  <!-- Icon + Wordmark centered -->
  <g transform="translate(480, 150)">
    <!-- Icon -->
    <path d="M100 20 L180 100 L144 136 L64 56 Z" fill="url(#flai-grad)" />
    <path d="M56 64 L136 144 L100 180 L20 100 Z" fill="url(#flai-grad)" opacity="0.75" />
    <!-- Wordmark -->
    <text x="220" y="120" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="80" font-weight="700" letter-spacing="-2" fill="#F8FAFC">flai</text>
  </g>
  <!-- Tagline -->
  <text x="750" y="380" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" font-weight="400" letter-spacing="3" fill="#94A3B8">AI CHAT COMPONENTS FOR FLUTTER</text>
  <!-- URL -->
  <text x="750" y="420" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" font-weight="500" fill="#6366F1">getflai.dev</text>
</svg>
